validator.channels=form,soap_api,rest_api
# A comma-separated list of supported validation types. Values need to be reflected in properties validator.typeLabel, validator.schemaFile, validator.schematronFolder.
validator.type = ubl,cii,credit
# Label to display in the web form for a given validation type (added as a postfix of validator.typeLabel). Only displayed if there are multiple types.
validator.typeLabel.ubl = UBL Invoice XML - release 1.3.16
validator.typeLabel.cii = CII Invoice XML - release 1.3.16
validator.typeLabel.credit = UBL Credit Note XML - release 1.3.16
# Title of the web page used for file upload.
validator.uploadTitle = Invoice validator
# The ID of the web service.
validator.webServiceId = InvoiceValidationService
# The description of the web service for element "xml".
validator.webServiceDescription.xml = The XML content representing the invoice to validate.
# The description of the web service for element "type". Only displayed if there are multiple types.
validator.webServiceDescription.type = The type of validation to perform (cii, ubl, credit).
# The schematron files loaded for a given validation type (added as a postfix). This can be a file or folder (must never start with a '/').
validator.schematronFile.ubl = ubl/schematron/EN16931-UBL-validation.xslt
validator.schematronFile.cii = cii/schematron/EN16931-CII-validation.xslt
validator.schematronFile.credit = ubl/schematron/EN16931-UBL-validation.xslt
# The XSD files loaded for a given validation type (added as a postfix). This can be a file or folder (must never start with a '/').
validator.schemaFile.ubl = ubl/xsds/maindoc/UBL-Invoice-2.1.xsd
validator.schemaFile.cii = cii/xsd/data/standard/CrossIndustryInvoice_100pD16B.xsd
validator.schemaFile.credit = ubl/xsds/maindoc/UBL-CreditNote-2.1.xsd
validator.includeTestDefinition = false
validator.bannerHtml = <div style="display: table; margin-bottom: 20px;"><div style="display: table-cell; cursor: pointer;" class="validatorReload"><img alt="eInvoicing" src="https://www.itb.ec.europa.eu/files/invoice_logo.png" style="height: 170px"/></div><div style="display: table-cell;padding-left: 20px;vertical-align: middle;"><h1 style="cursor: pointer" class="validatorReload">eInvoice Validator</h1><p>This is a service offered by the European Commission's DIGIT as part of the <a href="https://ec.europa.eu/digital-building-blocks/wikis/display/DIGITAL/About+us">Digital Europe Programme</a>, allowing you to validate electronic invoices against the requirements of the <a href="https://ec.europa.eu/digital-building-blocks/wikis/display/DIGITAL/What+is+eInvoicing">European Standard on eInvoicing</a>. This service is also available via <a href="https://www.itb.ec.europa.eu/xml/swagger-ui/index.html">REST API</a> and <a href="https://www.itb.ec.europa.eu/invoice/api/validation?wsdl">SOAP API</a>, with complete eInvoicing conformance testing supported through the <a href="https://www.itb.ec.europa.eu/cef/itb">eInvoicing Test Bed</a>.</p><p>Questions and feedback on this service can be sent to <a href="mailto:EC-EINVOICING-SUPPORT@ec.europa.eu">EC-EINVOICING-SUPPORT@ec.europa.eu</a>.</p></div></div>
# JavaScript code to support the banner HTML.
validator.javascriptExtension = $(document).ready(function() { $(".validatorReload").off().on("click", function() { window.location.href="upload"; });});